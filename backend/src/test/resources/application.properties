# Test-only overrides (added on top of the main application.yml, not replacing it).
# Rate limiting and demo seeding would interfere with the fast test suite, so
# both are off here; dedicated tests re-enable rate limiting with tiny limits.
app.ratelimit.enabled=false
app.demo.seed-on-startup=false
# Stats sync: no manual cooldown (tests drive syncs back to back) and a huge
# initial delay so the scheduled batch never fires inside a test context —
# tests call runSyncBatch() directly.
app.statsync.manual-cooldown-ms=0
app.statsync.job-initial-delay-ms=3600000

# Default profile = local development (H2 in-memory, zero setup).
# H2 runs in PostgreSQL compatibility mode so the same Flyway migrations run
# locally and in production. Production (Render + Neon) uses application-prod.yml.
spring:
  datasource:
    # Driver is auto-detected from the URL prefix (jdbc:h2 locally, jdbc:postgresql
    # in prod). Do NOT pin driver-class-name here or it leaks into the prod profile.
    url: jdbc:h2:mem:localmediakit;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    # Flyway owns the schema; Hibernate never generates or alters DDL.
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    # Adopt Flyway on a database that may already contain tables (the Step 0
    # 'kits' table created before Flyway): baseline instead of failing.
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  # Never expose internals in error responses.
  error:
    include-stacktrace: never
    include-message: never
  # gzip API/JSON responses over the wire.
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/css,application/javascript
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  # Frontend on-demand revalidation target. Overridden by env vars in every real
  # environment; the secret must NEVER be committed with a real value.
  revalidate:
    url: ${REVALIDATE_URL:http://localhost:3000/api/revalidate}
    secret: ${REVALIDATE_SECRET:local-dev-secret}
  jwt:
    # HS256 requires >= 32 bytes. Overridden by JWT_SECRET in every real environment.
    secret: ${JWT_SECRET:local-dev-jwt-secret-change-me-at-least-32-bytes-long}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  preview:
    # Lifetime of a signed draft-preview link (minutes).
    ttl-minutes: ${PREVIEW_TTL_MINUTES:30}
  cors:
    # Comma-separated list of allowed browser origins (the dashboard).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  analytics:
    # Salts the anonymous visitor fingerprint (sha256 of ip|ua|day|salt).
    # Override with a real value in production so hashes are not guessable.
    salt: ${ANALYTICS_SALT:local-dev-analytics-salt}
  ratelimit:
    # In-memory token buckets per client IP (per minute). Disabled in tests.
    enabled: ${RATELIMIT_ENABLED:true}
    login-capacity: ${RATELIMIT_LOGIN:10}
    register-capacity: ${RATELIMIT_REGISTER:30}
    track-capacity: ${RATELIMIT_TRACK:120}
    unlock-capacity: ${RATELIMIT_UNLOCK:20}
  demo:
    # Seed/reset the login-able demo account and purge @test.dev accounts.
    seed-on-startup: ${DEMO_SEED_ON_STARTUP:true}
    reset-cron: ${DEMO_RESET_CRON:0 0 * * * *}
  domains:
    # DNS verification job (custom-domain skeleton). Intervals in ms.
    job-interval-ms: ${DOMAIN_JOB_INTERVAL_MS:60000}
    job-initial-delay-ms: ${DOMAIN_JOB_INITIAL_DELAY_MS:30000}
    recheck-interval-ms: ${DOMAIN_RECHECK_INTERVAL_MS:60000}
    max-attempts: ${DOMAIN_MAX_ATTEMPTS:30}
    dns-timeout-ms: ${DOMAIN_DNS_TIMEOUT_MS:3000}
    dns-retries: ${DOMAIN_DNS_RETRIES:1}
    verify-host-prefix: ${DOMAIN_VERIFY_HOST_PREFIX:_localmediakit-verify}
  stripe:
    # TEST MODE keys only; real values live in the host's env, never in the repo.
    # With the dummy default, checkout answers 503 (billing not configured).
    secret-key: ${STRIPE_SECRET_KEY:sk_test_dummy}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_test_dummy}
    price-id: ${STRIPE_PRICE_ID:price_dummy}
  billing:
    # Where Stripe sends the visitor back after hosted Checkout.
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
